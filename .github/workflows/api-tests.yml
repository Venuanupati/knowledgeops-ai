name: API Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: knowledgeops
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d knowledgeops"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

    defaults:
      run:
        working-directory: apps/api

    env:
      APP_NAME: knowledgeops-ai
      APP_ENV: local
      API_V1_PREFIX: /api/v1
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowledgeops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: knowledgeops
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      QDRANT_HOST: localhost
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: knowledge_chunks
      OPENAI_API_KEY: test_key
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      OPENAI_CHAT_MODEL: gpt-4.1-mini
      TOP_K: 5
      MIN_TOP_K: 1
      MAX_TOP_K: 10
      MAX_UPLOAD_SIZE_MB: 10
      MIN_QUESTION_LENGTH: 3
      MAX_QUESTION_LENGTH: 2000
      LOG_LEVEL: INFO

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Ruff lint
        run: ruff check .

      - name: Check formatting
        run: ruff format . --check

      - name: Run unit tests
        run: pytest -m unit

      - name: Check Alembic current revision
        run: python -m alembic current

      - name: Run Alembic migrations
        run: python -m alembic upgrade head

      - name: Run integration tests
        run: pytest -m integration

      - name: Run coverage gate
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=30